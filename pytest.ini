[pytest]
markers =
    smoke: Quick sanity checks - core API health
    regression: Full regression suite
    negative: Negative and edge case tests
    users: User endpoint tests
    repos: Repository endpoint tests
    search: Search endpoint tests
    ratelimit: Rate limit and auth tests

addopts =
    --html=reports/report.html
    --self-contained-html
    -v

testpaths = tests
